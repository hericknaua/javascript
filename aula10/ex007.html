<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somando Números</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 2em;
        }
        
        input {
            font: normal 18pt Arial;
            width: 150px;
            text-align: center;
            margin-bottom: 20px;
        }
        
    </style>
</head>
<body>
    <h1>Somando valores</h1>
    <input type="number" name="n1" id="in1"> +
    <input type="number" name="n2" id="in2">
    <input type="submit" value="Enviar" onclick="somando()">
    <div>Resultado: </div>
    
    <script>
        var resu = document.getElementsByTagName("div")[0]
        resu.addEventListener("click", clique)
        function somando() {
            var c1 = document.getElementById("in1") 
            var c2 = document.getElementById("in2")
            var n1 = Number(c1.value)
            var n2 = Number(c2.value)
            var soma = n1 + n2
            resu.innerHTML = `A soma entre o valor ${n1} + ${n2} é igual a <strong>${soma}</strong>`
        }

        function clique () {
            resu.style.color = "white"
            resu.style.background = "red"
        }
    </script>
</body>
</html>
