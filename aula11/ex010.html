<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Condições</title>
    <style>
        body {
            background-color: lightgray;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 1.7em;
        }

        input {
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de Condições em JavaScript</h1>
    <label for="ipais">PAÍS QUE NASCEU:</label>
    <input type="text" name="pais" id="ipais">
    <input type="button" value="Verificar" onclick="verificador()">
    <div id="di">Você é...</div>
    <script>
        function verificador() {
            var pais = document.getElementById("ipais").value
            var msg = document.getElementById("di")
            if(pais=="Brasil") {
                msg.innerHTML = "Você é <strong>Brasileiro</strong>!"
                msg.style.color = "green"
            } else {
                msg.innerHTML = "Você é <strong>estrangeiro!</strong>"
                msg.style.color = "red"
            }
        }
    </script>
</body>
</html>
